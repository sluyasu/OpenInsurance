name: freshness

on:
  schedule:
    - cron: "17 6 1 * *"   # monthly, the 1st at 06:17 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install httpx pyyaml
      - name: Check source URLs against the manifest
        run: python pipeline/check_freshness.py --country be | tee freshness-report.md
      - name: Open an issue when sources changed or disappeared
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if grep -qE "^## (Changed|Gone)" freshness-report.md; then
            gh issue create \
              --title "Source PDFs changed or gone ($(date -u +%Y-%m))" \
              --body-file freshness-report.md
          else
            echo "All sources unchanged."
          fi
