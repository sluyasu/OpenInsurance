name: release

# Publishing used to be manual: build, type a PyPI token into twine, then re-login to the
# MCP registry with a device flow because the saved token had expired. That is why the
# published package drifted behind the repo. Now a tag is the whole release.
#
# No secrets are stored anywhere. Both registries authenticate with this workflow's
# short-lived GitHub OIDC identity:
#   - PyPI Trusted Publishing (one-time setup on pypi.org, see below)
#   - the MCP registry's github-oidc login
#
# ONE-TIME SETUP on pypi.org (project openinsurance-wiki-mcp > Publishing):
#   Owner: sluyasu | Repository: OpenInsurance | Workflow: release.yml | Environment: pypi
# Until that exists, the publish step fails with an explanatory error and nothing is
# half-published: the build and the tag/version check still run.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # A tag that disagrees with the packaged version is how 0.2.0 ended up describing
      # code that was not in it. Fail before anything is published.
      - name: Tag must match the packaged version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PY=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          SJ=$(python -c "import json;d=json.load(open('server.json'));print(d['version'])")
          SJP=$(python -c "import json;d=json.load(open('server.json'));print(d['packages'][0]['version'])")
          echo "tag=$TAG pyproject=$PY server.json=$SJ server.json/packages=$SJP"
          test "$TAG" = "$PY" && test "$TAG" = "$SJ" && test "$TAG" = "$SJP"

      - run: python -m pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # Trusted Publishing: no token, no secret
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  mcp-registry:
    needs: pypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # the registry accepts this workflow's OIDC identity
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          curl -fsSL https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz \
            | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/
      # PyPI needs a moment before the new version resolves; the registry validates that
      # the package it points at actually exists.
      - name: Wait for the version to appear on PyPI
        run: |
          V=$(python -c "import json;print(json.load(open('server.json'))['packages'][0]['version'])")
          for i in $(seq 1 30); do
            if curl -fsS "https://pypi.org/pypi/openinsurance-wiki-mcp/$V/json" > /dev/null; then
              echo "openinsurance-wiki-mcp $V is on PyPI"; exit 0
            fi
            echo "waiting for $V on PyPI ($i/30)"; sleep 10
          done
          echo "timed out waiting for PyPI"; exit 1
      - name: Publish to the MCP registry
        run: |
          mcp-publisher login github-oidc
          mcp-publisher publish
