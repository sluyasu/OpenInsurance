name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install pyyaml
      - name: Wiki gates (frontmatter, wikilinks, citations)
        run: python pipeline/validate.py --country be
      - name: Build idempotence (rebuilding the committed wiki must be a zero diff)
        run: |
          python pipeline/build_wiki.py --country be
          python pipeline/build_index.py --country be
          git diff --exit-code
