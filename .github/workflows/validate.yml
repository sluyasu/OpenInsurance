name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # jsonschema is required, not optional: validate now checks the extracted JSON
      # against the committed schema, which is the only gate that runs without the PDFs.
      - run: python -m pip install pyyaml "mcp[cli]" pytest jsonschema
      # Every country in sources/, not just Belgium: a second country must be gated from
      # its first commit, or it inherits the drift the first one took months to clear.
      - name: Wiki gates (frontmatter, links, citations, publish surface)
        # --strict-links fails the build if a link's target name is claimed by more than
        # one page. A basename resolver picks one silently, so the wrong page is served
        # with no visible error. The count is 0; keep it there.
        run: |
          for cc in $(ls sources/); do
            echo "::group::validate $cc"
            python pipeline/validate.py --country "$cc" --strict-links
            echo "::endgroup::"
          done
      - name: MCP server tests (security, document selection, matching, tool smoke)
        run: python -m pytest tests/ -q
      - name: Build idempotence (rebuilding the committed wiki must be a zero diff)
        run: |
          for cc in $(ls sources/); do
            python pipeline/build_wiki.py --country "$cc"
            python pipeline/build_index.py --country "$cc"
          done
          git diff --exit-code
