name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # One-time setup: Settings > Pages > Source = "GitHub Actions", then re-run.
      - uses: actions/configure-pages@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install mkdocs-material mkdocs-roamlinks-plugin
      - name: Stage site sources (the wiki, untouched, plus an index page)
        run: |
          mkdir -p site-src
          cp -R wiki/. site-src/
          rm -rf site-src/.obsidian
          cp "wiki/00 - START HERE.md" site-src/index.md
      - run: mkdocs build
      # Blocking: the wiki gates check the markdown sources, which can be perfectly valid
      # while the rendered site 404s (a link the roamlinks plugin could not resolve, a
      # path that leaves the published tree). Deploying a site with dead links is worse
      # than not deploying, because the gates stay green and nobody looks.
      - name: Check the built site for dead links
        run: python pipeline/check_site_links.py site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
