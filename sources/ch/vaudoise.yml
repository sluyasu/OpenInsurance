insurer:
  slug: vaudoise
  name: Vaudoise Assurances
  website: https://www.vaudoise.ch/fr
  segment: particuliers
  notes: |
    Romandy-native non-life insurer (Lausanne); French is the source language, not a
    translation. One central CGA library page lists every document as a direct .pdf href,
    so plain HTTP is enough and no renderer is needed.

    GOTCHA: the CMS reuses a filename root and appends a hash, so two URLs can share a
    stem and be different documents. building_cga_012023_f.pdf is "Building" (edition
    01.01.2023, 46 pages) while building_cga_012023_f1ba6c3d...pdf is "Assurances de
    construction" (edition 01.01.2022, 35 pages). Verified by downloading both and reading
    page 1: different sha256, different titles, different editions. Never de-duplicate
    these by filename; the pipeline keys on a hash of the source URL, which is correct here.
  fetch_tier: plain          # plain curl returns 200 on the listing page and on every PDF
