  notes: Assurances du Crédit Mutuel Belgium, the bancassurance carrier distributed via
    the Beobank / Credit Mutuel channel. Public product docs (CG + IPID) are hosted on the
    Euro-Information CDN (cdnwmii.e-i.com), pattern .../assets/articles/<category>/1.0/<YYYYMMDD>_<TYPE>...;
    edition dates read from the YYYYMMDD filename prefix. Eight products across auto, moto,
    cyclomoteur, habitation, familiale, velo and accidents vie privee. Assistance cover is
    co-branded with Allianz Assistance (not an ACM product doc, excluded).
