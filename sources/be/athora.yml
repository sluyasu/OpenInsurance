  name: Athora Belgium
  website: https://www.athora.com/be
  segment: particuliers
  notes: Athora Belgium (NBB INS 145). Its public library is life / investment only
    (branche 21 and 23), no non-life. The rows below are the full current set of life-product
    general conditions plus one addendum and two representative PRIIPs KID (DIC). Several
    product names recur across document codes (e.g. Self Life Dynamico = 1F758 / 1F806 /
    1F891) = successive editions or variants of the same product family; only Safe Horizon
    3/5 expose an explicit edition token (ED0924 = 2024-09). Legacy Generali-era products
    (Crescendo, Ventisei) are closed to new business but their conditions stay published.
    There is no generic life branch in the taxonomy, so pure-life products are filed under
    epargne (branche 21/23). Docs hosted on marketing.be.athora.site; a full NL mirror exists.
languages:
