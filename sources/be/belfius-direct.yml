  website: https://www.belfiusdirect.be
  segment: particuliers
  notes: Belfius Direct Assurances is the online direct brand (formerly Corona Direct), distinct
    from the Belfius Insurance bancassurance products on belfius.be. Auto is sold "au kilomètre".
    Full retail line covering auto/moto/velomoteur, habitation/locataire/homie, familiale, velo,
    animaux, assistance and assistance voyage, funerailles (obseques) and hospitalisation (sante).
    Current canonical general conditions kept; superseded editions on the CG page were skipped.
    Fiches info are precontractual product-information sheets (product_sheet).
