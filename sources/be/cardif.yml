insurer:
  slug: cardif
  name: BNP Paribas Cardif
  website: https://www.bnpparibascardif.be
  segment: particuliers
  notes: BNP Paribas Cardif Belgium is a credit / payment protection insurer. Hypo Protect is
    the assurance solde restant du (decreasing term death cover on a mortgage, with possible
    incapacity riders); Short Term Protect is payment protection on temperament / consumer loans
    (death, incapacity, involuntary unemployment). No pure life branch exists in the taxonomy and
    these are not savings products, so they are filed under autres (credit protection). Public docs
    come from the "Informations juridiques" page (Liferay document store); Luxembourg variants are
    published on the Belgian site and kept for completeness.
